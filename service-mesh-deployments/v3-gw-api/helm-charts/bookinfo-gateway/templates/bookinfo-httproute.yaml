apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.bookinfo.virtualService.name }}
  namespace: {{ .Values.bookinfo.virtualService.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.bookinfo.gateway.name }}
    namespace: {{ .Values.bookinfo.gateway.namespace }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /productpage
    - path:
        type: PathPrefix
        value: /static
    - path:
        type: Exact
        value: /login
    - path:
        type: Exact
        value: /logout
    - path:
        type: PathPrefix
        value: /api/v1/products
    backendRefs:
    - name: productpage
      port: 9080