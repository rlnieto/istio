apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ .Values.bookinfo.gateway.name }}
  namespace: {{ .Values.bookinfo.gateway.namespace }}
spec:
  # The selector matches the ingress gateway pod labels.
  # If you installed Istio using Helm following the standard documentation, this would be "istio=ingress"
  selector:
    istio: ingressgateway # use istio default controller
  servers:
  # Puerto en el que escucha el ingress
  - port:
      number: 8080
      name: http2
      protocol: HTTP
    hosts:
    # Revisar esta definición porque está cogiendo la del ingress
    - "*"
#  - port:
#      number: 443
#      name: https
#      protocol: HTTPS
#    hosts:
    # Revisar esta definición porque está cogiendo la del ingress
