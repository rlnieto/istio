apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .Values.bookInfoGateway.vsName }}
  namespace: {{ .Values.bookInfoGateway.namespace }}
spec:
  hosts:
  - "*"
  gateways:
  - {{ .Values.bookInfoGateway.name }}
  http:
  - match:
    - uri:
        exact: /productpage
    - uri:
        prefix: /static
    - uri:
        exact: /login
    - uri:
        exact: /logout
    - uri:
        prefix: /api/v1/products
    route:
    - destination:
        host: productpage
        port:
          number: 9080
